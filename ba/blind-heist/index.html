<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Blind Heist</title>
<link rel="stylesheet" href="../../assets/common.css">
</head>
<body>
<script src="../../assets/common.js"></script>
<script>
/* BLIND HEIST — a Colonel Blotto game. Each player secretly splits 10 gems
   among 3 vaults. Both reveal at once. In each vault, whoever put MORE gems
   wins that vault (1 point); a tie scores nobody. Most vault-points wins the
   round. Best of 3 rounds.

   AI: each round pick a random allocation from a pool of strong Blotto
   splits (all permutations of a set of good shapes) so it can't be exploited;
   with a little counter-adaptation toward the human's recent tendencies. */

const HEX = { 1: '#3a86ff', 2: '#ff5a5f' };
const GEMS = 10, VAULTS = 3, ROUNDS = 3;
const VAULT_EMOJI = ['🔵', '🟢', '🟣'];
const VAULT_COLOR = ['#3a86ff', '#2ec4b6', '#8338ec'];
const VAULT_NAME = ['Blue Vault', 'Green Vault', 'Purple Vault'];

MM.game({
  title: 'Blind Heist', emoji: '💎',
  ba: 'https://beastacademy.com/playground/blind-heist',
  rules: `
    <p><b>Sneak the most gems into the vaults!</b> You have <b>10 gems</b> 💎 and <b>3 vaults</b>.</p>
    <ol>
      <li>Secretly split all 10 gems among the 3 vaults (like <b>4-3-3</b> or <b>8-1-1</b> — any split works!).</li>
      <li>Both players <b>reveal at the same time</b>.</li>
      <li>In each vault, whoever put in <b>more gems</b> wins that vault (1 point). A tie? Nobody scores that vault.</li>
      <li>Win the <b>most vaults</b> to win the round. Play <b>3 rounds</b> — most points total wins! 🏆</li>
    </ol>
    <p>Tip: You can't spread out AND stack up everywhere. <b>No split always wins</b> — it's a game of clever guessing and odds!</p>`,
  modes: [
    { id: 'ai',  emoji: '🤖', name: 'Vs Computer', sub: 'You vs the robot thief' },
    { id: 'two', emoji: '🧑‍🤝‍🧑', name: '2 Players', sub: 'Pass & hide' },
  ],
  onStart,
});

function onStart(mode, mount) {
  const vsAI = (mode === 'ai');
  let round = 1;
  let score = { 1: 0, 2: 0 };          // round wins (best of 3)
  let humanHistory = [];               // past human splits for AI adaptation

  const panel = MM.el('div', { class: 'mm-panel mm-center mm-bounce-in' });
  mount.appendChild(panel);

  function label(pl) {
    if (!vsAI) return 'Player ' + pl;
    return pl === 1 ? 'You' : 'Computer';
  }

  function scorebar() {
    return MM.el('div', { class: 'mm-scorebar' },
      MM.el('div', { class: 'mm-score' },
        MM.el('span', { class: 'dot', style: { background: HEX[1] } }),
        MM.el('span', {}, label(1) + ': ' + score[1])),
      MM.el('div', { class: 'mm-score' },
        MM.el('span', {}, '🏆 Round ' + Math.min(round, ROUNDS) + ' / ' + ROUNDS)),
      MM.el('div', { class: 'mm-score' },
        MM.el('span', { class: 'dot', style: { background: HEX[2] } }),
        MM.el('span', {}, label(2) + ': ' + score[2])),
    );
  }

  /* ---------------- a reusable "set your split" editor ---------------- */
  // returns { node } and calls onDone(split) when the player commits.
  function makeEditor(who, onDone) {
    const split = [4, 3, 3];           // sensible default that sums to 10
    const wrap = MM.el('div', {});

    const title = MM.el('h2', { class: 'mm-center', style: { marginTop: '4px' } },
      MM.el('span', { class: 'chip', style: { background: HEX[who] } }, label(who)),
      ' — hide your 10 gems 💎');

    const left = MM.el('div', { style: { fontWeight: '800', fontSize: '20px', margin: '6px 0 14px' } });

    const vaultRow = MM.el('div', {
      style: { display: 'flex', gap: '12px', justifyContent: 'center', flexWrap: 'wrap', margin: '8px 0' },
    });

    const doneBtn = MM.el('button', {
      class: 'mm-btn green', style: { fontSize: '20px', padding: '14px 28px', minHeight: '54px', marginTop: '10px' },
    }, '🔒 Lock it in!');

    function remaining() { return GEMS - split.reduce((a, b) => a + b, 0); }

    function step(v, d) {
      const nv = split[v] + d;
      if (nv < 0 || nv > GEMS) return;
      if (d > 0 && remaining() <= 0) { MM.sound.play('wrong'); return; }
      split[v] = nv;
      MM.sound.play(d > 0 ? 'place' : 'click');
      render();
    }

    function render() {
      const rem = remaining();
      left.innerHTML = rem === 0
        ? '<span style="color:#2ec4b6">All 10 gems placed! ✅</span>'
        : ('Gems left to place: <b style="color:#ff9f1c">' + rem + '</b> ' + '💎'.repeat(Math.min(rem, 10)));
      vaultRow.innerHTML = '';
      for (let v = 0; v < VAULTS; v++) {
        const col = VAULT_COLOR[v];
        const card = MM.el('div', {
          style: {
            background: '#fff', border: '4px solid ' + col, borderRadius: '20px',
            padding: '12px 10px', width: '108px', boxShadow: '0 6px 0 rgba(0,0,0,.10)',
          },
        });
        card.appendChild(MM.el('div', { style: { fontSize: '15px', fontWeight: '800', color: col } }, VAULT_NAME[v]));
        card.appendChild(MM.el('div', { style: { fontSize: '30px', margin: '2px 0' } }, VAULT_EMOJI[v]));
        // big number + gem preview
        const gemStr = split[v] === 0 ? '·' : '💎'.repeat(split[v]);
        card.appendChild(MM.el('div', {
          style: { fontSize: '13px', lineHeight: '1.15', minHeight: '30px', wordBreak: 'break-word' },
        }, gemStr));
        card.appendChild(MM.el('div', { style: { fontSize: '34px', fontWeight: '800', color: col } }, String(split[v])));
        const btnRow = MM.el('div', { style: { display: 'flex', gap: '8px', justifyContent: 'center', marginTop: '6px' } });
        const minus = MM.el('button', {
          class: 'mm-btn ghost', style: { width: '44px', height: '44px', padding: '0', justifyContent: 'center', fontSize: '24px' },
          onClick: () => step(v, -1),
        }, '−');
        const plus = MM.el('button', {
          class: 'mm-btn', style: { width: '44px', height: '44px', padding: '0', justifyContent: 'center', fontSize: '24px', background: col },
          onClick: () => step(v, +1),
        }, '+');
        minus.disabled = split[v] === 0;
        plus.disabled = rem <= 0;
        btnRow.append(minus, plus);
        card.appendChild(btnRow);
        // tapping the vault card body also adds a gem (kid-friendly)
        card.style.cursor = 'pointer';
        card.addEventListener('click', (e) => { if (e.target.tagName !== 'BUTTON') step(v, +1); });
        vaultRow.appendChild(card);
      }
      doneBtn.disabled = rem !== 0;
    }

    doneBtn.addEventListener('click', () => {
      if (remaining() !== 0) return;
      MM.sound.play('ding');
      onDone(split.slice());
    });

    wrap.append(title, left, vaultRow,
      MM.el('div', { class: 'mm-hint' }, 'Tap + / − or tap a vault. Use all 10 gems.'),
      MM.el('div', { class: 'mm-row' }, doneBtn));
    render();
    return wrap;
  }

  /* ---------------- pass-and-hide cover screen (2 players) ---------------- */
  function coverScreen(who, onReady) {
    panel.innerHTML = '';
    panel.appendChild(scorebar());
    panel.appendChild(MM.el('div', { class: 'mm-center', style: { padding: '18px 6px' } },
      MM.el('div', { style: { fontSize: '64px' } }, '🙈'),
      MM.el('h2', {}, 'Pass the device to'),
      MM.el('div', { style: { fontSize: '26px', fontWeight: '800', color: HEX[who], margin: '4px 0 14px' } }, label(who)),
      MM.el('div', { class: 'mm-hint' }, 'No peeking, ' + (who === 1 ? 'Player 2' : 'Player 1') + '! 👀'),
      MM.el('button', {
        class: 'mm-btn', style: { fontSize: '20px', padding: '14px 30px', minHeight: '54px', background: HEX[who] },
        onClick: () => { MM.sound.play('swoosh'); onReady(); },
      }, '👉 I\'m ' + label(who) + ' — ready!')));
  }

  /* ---------------- AI allocation ---------------- */
  // Pool of strong Blotto shapes; all permutations are candidates.
  const SHAPES = [[4, 3, 3], [5, 4, 1], [5, 5, 0], [6, 3, 1], [4, 4, 2], [5, 3, 2], [6, 2, 2], [7, 2, 1]];
  function permutations(a) {
    const out = [];
    const seen = new Set();
    const perm = (arr, cur) => {
      if (arr.length === 0) {
        const k = cur.join(',');
        if (!seen.has(k)) { seen.add(k); out.push(cur.slice()); }
        return;
      }
      for (let i = 0; i < arr.length; i++) {
        const rest = arr.slice(0, i).concat(arr.slice(i + 1));
        perm(rest, cur.concat(arr[i]));
      }
    };
    perm(a, []);
    return out;
  }
  const AI_POOL = [];
  SHAPES.forEach(s => permutations(s).forEach(p => AI_POOL.push(p)));

  function aiSplit() {
    // Base: random strong allocation.
    let pick = MM.choice(AI_POOL);
    // Light counter-adaptation: if the human has been loading one vault a lot,
    // occasionally aim a big pile at a DIFFERENT vault to steal two others.
    if (humanHistory.length && MM.rand(2) === 0) {
      const totals = [0, 0, 0];
      humanHistory.forEach(h => h.forEach((g, i) => totals[i] += g));
      // human's favorite (most-loaded) vault
      let fav = 0; for (let i = 1; i < 3; i++) if (totals[i] > totals[fav]) fav = i;
      // choose a candidate that concedes `fav` (puts fewest there) to win the other two
      const conceding = AI_POOL.filter(p => {
        const others = [0, 1, 2].filter(i => i !== fav);
        return p[fav] === Math.min(p[0], p[1], p[2]) && p[others[0]] >= 3 && p[others[1]] >= 3;
      });
      if (conceding.length) pick = MM.choice(conceding);
    }
    return pick.slice();
  }

  /* ---------------- scoring + reveal ---------------- */
  function scoreVaults(a, b) {
    // returns { pts:[p1,p2], winners:[per-vault 1|2|0] }
    const pts = [0, 0], winners = [];
    for (let v = 0; v < VAULTS; v++) {
      if (a[v] > b[v]) { pts[0]++; winners.push(1); }
      else if (b[v] > a[v]) { pts[1]++; winners.push(2); }
      else winners.push(0);
    }
    return { pts, winners };
  }

  async function reveal(p1split, p2split) {
    if (vsAI) humanHistory.push(p1split.slice());
    const { pts, winners } = scoreVaults(p1split, p2split);
    const roundWinner = pts[0] > pts[1] ? 1 : pts[1] > pts[0] ? 2 : 0;

    panel.innerHTML = '';
    panel.appendChild(scorebar());
    panel.appendChild(MM.el('h2', { class: 'mm-center', style: { marginTop: '2px' } }, '🔓 Reveal!'));
    MM.status('<span class="chip" style="background:#ff9f1c">Cracking the vaults…</span>');

    // headers row
    const grid = MM.el('div', {
      style: { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '10px', margin: '8px auto', maxWidth: '440px' },
    });
    panel.appendChild(grid);

    // build 3 vault columns, animate reveal one at a time
    const cells = [];
    for (let v = 0; v < VAULTS; v++) {
      const col = VAULT_COLOR[v];
      const cell = MM.el('div', {
        style: {
          border: '4px solid ' + col, borderRadius: '18px', padding: '10px 6px',
          background: '#fff', boxShadow: '0 6px 0 rgba(0,0,0,.08)', minHeight: '150px',
        },
      });
      cell.appendChild(MM.el('div', { style: { fontSize: '15px', fontWeight: '800', color: col } }, VAULT_EMOJI[v] + ' ' + VAULT_NAME[v]));
      const body = MM.el('div', { style: { marginTop: '6px' } });
      cell.appendChild(body);
      cells.push(body);
      grid.appendChild(cell);
    }

    function sideRow(pl, n, win) {
      return MM.el('div', {
        style: {
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          background: win ? HEX[pl] : '#f3eef7', color: win ? '#fff' : 'var(--ink)',
          borderRadius: '10px', padding: '5px 8px', margin: '4px 0', fontWeight: '800', fontSize: '15px',
        },
      },
        MM.el('span', {}, label(pl)),
        MM.el('span', {}, String(n) + ' 💎' + (win ? ' 👑' : '')));
    }

    await MM.sleep(300);
    for (let v = 0; v < VAULTS; v++) {
      MM.sound.play('deal');
      cells[v].appendChild(sideRow(1, p1split[v], winners[v] === 1));
      cells[v].appendChild(sideRow(2, p2split[v], winners[v] === 2));
      const verdict = winners[v] === 0
        ? MM.el('div', { style: { textAlign: 'center', fontWeight: '800', fontSize: '14px', color: '#6b6480', marginTop: '2px' } }, '🤝 Tie')
        : MM.el('div', { style: { textAlign: 'center', fontWeight: '800', fontSize: '14px', color: HEX[winners[v]], marginTop: '2px' } }, label(winners[v]) + ' takes it!');
      cells[v].appendChild(verdict);
      MM.sound.play(winners[v] === 0 ? 'pop' : 'ding');
      await MM.sleep(650);
    }

    // round tally
    await MM.sleep(200);
    const tally = MM.el('div', {
      style: { fontSize: '20px', fontWeight: '800', margin: '10px 0 6px' },
    }, 'Vaults won — ' + label(1) + ': ' + pts[0] + '  •  ' + label(2) + ': ' + pts[1]);
    panel.appendChild(tally);

    let banner;
    if (roundWinner === 0) {
      banner = MM.el('div', { style: { fontSize: '22px', fontWeight: '800', color: '#ff9f1c' } }, '🤝 Round ' + round + ' is a tie!');
      MM.sound.play('pop');
    } else {
      score[roundWinner]++;
      banner = MM.el('div', { style: { fontSize: '22px', fontWeight: '800', color: HEX[roundWinner] } },
        '🏆 ' + label(roundWinner) + ' wins Round ' + round + '!');
      MM.sound.play('star');
      if (!(vsAI && roundWinner === 2)) MM.confetti({ count: 70 });
    }
    panel.appendChild(banner);
    // refresh scorebar with new scores
    panel.replaceChild(scorebar(), panel.firstChild);

    const seriesOver = round >= ROUNDS;
    const nextBtn = MM.el('button', {
      class: 'mm-btn', style: { fontSize: '20px', padding: '14px 28px', minHeight: '54px', marginTop: '12px' },
      onClick: () => {
        MM.sound.play('click');
        if (seriesOver) finishSeries();
        else { round++; startRound(); }
      },
    }, seriesOver ? '🏁 See final result' : '➡️ Next round');
    panel.appendChild(MM.el('div', { class: 'mm-row' }, nextBtn));
    MM.status('<span class="chip" style="background:#2ec4b6">Round ' + round + ' done</span>');
  }

  function finishSeries() {
    const winner = score[1] > score[2] ? 1 : score[2] > score[1] ? 2 : 0;
    if (winner === 0) {
      MM.win({
        title: "It's a tie! 🤝", emoji: '💎',
        sub: 'You each won the same number of rounds. Rematch?',
        onAgain: () => MM.toMenu(),
      });
      return;
    }
    if (vsAI) {
      const youWin = winner === 1;
      MM.win({
        lose: !youWin,
        title: youWin ? 'You cracked the heist! 🎉' : 'The robot out-thieved you!',
        emoji: youWin ? '🏆' : '🤖',
        sub: 'Final rounds — You ' + score[1] + ' : ' + score[2] + ' Computer.' +
          (youWin ? ' Master thief!' : ' Try a sneakier split next time!'),
        onAgain: () => MM.toMenu(),
      });
    } else {
      MM.win({
        title: label(winner) + ' wins the heist! 🎉',
        emoji: winner === 1 ? '🔵' : '🔴',
        sub: 'Final rounds — ' + label(1) + ' ' + score[1] + ' : ' + score[2] + ' ' + label(2),
        onAgain: () => MM.toMenu(),
      });
    }
  }

  /* ---------------- round flow ---------------- */
  function startRound() {
    if (vsAI) {
      // human sets split, AI already (secretly) chose
      const ai = aiSplit();
      panel.innerHTML = '';
      panel.appendChild(scorebar());
      MM.status('<span class="chip" style="background:' + HEX[1] + '">Your turn — hide your gems</span>');
      panel.appendChild(makeEditor(1, (p1) => reveal(p1, ai)));
    } else {
      // pass-and-hide: player 1 then player 2, each behind a cover
      let p1split = null;
      coverScreen(1, () => {
        panel.innerHTML = '';
        panel.appendChild(scorebar());
        MM.status('<span class="chip" style="background:' + HEX[1] + '">Player 1 hiding…</span>');
        panel.appendChild(makeEditor(1, (s) => {
          p1split = s;
          coverScreen(2, () => {
            panel.innerHTML = '';
            panel.appendChild(scorebar());
            MM.status('<span class="chip" style="background:' + HEX[2] + '">Player 2 hiding…</span>');
            panel.appendChild(makeEditor(2, (p2) => reveal(p1split, p2)));
          });
        }));
      });
    }
  }

  startRound();
}
</script>
</body>
</html>
