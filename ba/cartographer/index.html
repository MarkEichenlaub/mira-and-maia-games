    const EQUESTRIA_ADJ = {

    // ── Map configurations ─────────────────────────────────────────────
    // type:'topo'   → fetches topojson from URL, projects into 600×420 viewBox
    // type:'custom' → uses pre-defined SVG paths in 600×420 viewBox
    const MAP_CONFIGS = {
      us: {
        type:'topo', label:'United States',
        url:'../../assets/vendor/us-states-10m.json',
        objectName:'states',
        filterGeom: g => g.id !== 11,
        getId: id => String(id).padStart(2,'0'),
        getName: id => CNAMES[id] || String(id),
        makeProj: features =>
          d3.geoAlbersUsa().fitExtent([[20,40],[580,410]],
            { type:'FeatureCollection', features }),
        fontSize: 7,
      },
      africa: {
        type:'topo', label:'Africa',
        url:'../../assets/vendor/world-countries-110m.json',
        objectName:'countries',
        filterGeom: g => AFRICA_IDS.has(+g.id),
        getId: id => String(id),
        getName: id => CNAMES[+id] || String(id),
        makeProj: features =>
          d3.geoMercator().fitExtent([[20,40],[580,410]],
            { type:'FeatureCollection', features }),
        fontSize: 6.5,
      },
      europe: {
        type:'topo', label:'Europe',
        url:'../../assets/vendor/world-countries-110m.json',
        objectName:'countries',

        getId: id => String(id),
        getName: id => CNAMES[+id] || String(id),

          d3.geoMercator().fitExtent([[20,40],[580,410]],
            { type:'FeatureCollection', features }),

        getId: id => String(id),

      },

    // ── Sound ──────────────────────────────────────────────────────────
    const playSound = (type) => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const note = (freq, t0, dur, vol=0.2, wave='sine') => {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = wave; o.frequency.value = freq;
          g.gain.setValueAtTime(vol, ctx.currentTime + t0);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t0 + dur);
          o.start(ctx.currentTime + t0);
          o.stop(ctx.currentTime + t0 + dur + 0.05);
        };
        if (type === 'place')   note(440, 0, 0.12);
        if (type === 'invalid') note(160, 0, 0.28, 0.15, 'sawtooth');
        if (type === 'win')     [523,659,784,1047].forEach((f,i) => note(f, i*0.15, 0.3, 0.25));
      } catch(_) {}
    };

    // ── Error boundary ─────────────────────────────────────────────────
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { err: null }; }
      static getDerivedStateFromError(err) { return { err }; }
      render() {
        if (this.state.err) return (
          <div style={{padding:40,color:'#FC8181',fontFamily:'sans-serif'}}>
            <h2>Something went wrong loading the map.</h2>
            <p style={{marginTop:12,opacity:0.6}}>{String(this.state.err)}</p>
            <button onClick={() => this.setState({err:null})}
              style={{marginTop:20,padding:'8px 20px',background:'#3498DB',color:'#fff',border:'none',borderRadius:8,cursor:'pointer'}}>
              Try Again
            </button>
          </div>
        );
        return this.props.children;
      }
    }

    // ── Main component ─────────────────────────────────────────────────
    function Cartographer() {
      const [selectedMap, setSelectedMap]     = useState('us');
      const [numColors,   setNumColors]       = useState(4);
      const [mapFeatures, setMapFeatures]     = useState([]);
      const [adjacency,   setAdjacency]       = useState({});
      const [loading,     setLoading]         = useState(true);
      const [loadError,   setLoadError]       = useState('');

      // game state
      const [regionColors, setRegionColors]   = useState({});
      const [currentPlayer,setCurrentPlayer]  = useState(1);
      const [selectedColor,setSelectedColor]  = useState(null);
      const [gameStatus,   setGameStatus]     = useState('playing');
      const [message,      setMessage]        = useState(null);
      const [flashRegion,  setFlashRegion]    = useState(null);
      const [confetti,     setConfetti]       = useState([]);

      // Cache fetched topologies to avoid re-downloading on map switch
      const topoCache = useRef({});

      const activeColors = useMemo(() => ALL_COLORS.slice(0, numColors), [numColors]);

      const resetGame = useCallback(() => {
        setRegionColors({});
        setCurrentPlayer(1);
        setSelectedColor(null);
        setGameStatus('playing');
        setMessage(null);
        setFlashRegion(null);
        setConfetti([]);
      }, []);

      // ── Load map whenever selectedMap changes ──────────────────────
      useEffect(() => {
        const cfg = MAP_CONFIGS[selectedMap];
        setLoadError('');
        resetGame();

        if (cfg.type === 'custom') {
          // Custom maps: data is already in code
          const adj = {};
          cfg.regions.forEach(r => {
            adj[r.id] = new Set(cfg.adjacencyList[r.id] || []);
          });
          setMapFeatures(cfg.regions.map(r => ({
            id: r.id, name: r.name, pathD: r.pathD, centroid: r.centroid,
          })));
          setAdjacency(adj);
          setLoading(false);
        } else {
          // TopoJSON map: fetch (with cache), then project
          setLoading(true);
          setMapFeatures([]);
          setAdjacency({});

          const doLoad = (topo) => {
            try {
              const allGeoms   = topo.objects[cfg.objectName].geometries;
              const filtered   = allGeoms.filter(cfg.filterGeom);

              if (filtered.length === 0) {
                setLoadError('No regions found for this map.');
                setLoading(false);
                return;
              }

              // Adjacency via shared TopoJSON arcs
              const nbIdx = topojson.neighbors(filtered);
              const adj   = {};
              filtered.forEach((g, i) => {
                const id   = cfg.getId(g.id);
                adj[id]    = new Set(nbIdx[i].map(j => cfg.getId(filtered[j].id)));
              });

              // Build sub-topology for filtered set (keeps all arcs)
              const subTopo = {
                ...topo,
                objects: {
                  [cfg.objectName]: {
                    ...topo.objects[cfg.objectName],
                    geometries: filtered,
                  },
                },
              };
              const features = topojson.feature(subTopo, subTopo.objects[cfg.objectName]).features;

              // Project into 600×420 coordinate space
              const proj    = cfg.makeProj(features);
              const pathGen = d3.geoPath().projection(proj);

              const processed = features.map(f => {
                const id   = cfg.getId(f.id);
                const pathD = pathGen(f);
                const ctr  = pathGen.centroid(f);
                return {
                  id,
                  name:     cfg.getName(id),
                  pathD,
                  centroid: (ctr && !isNaN(ctr[0]) && !isNaN(ctr[1])) ? ctr : null,
                };
              }).filter(f => f.pathD && f.pathD.length > 10);

              setMapFeatures(processed);
              setAdjacency(adj);
              setLoading(false);
            } catch (err) {
              console.error('Map processing error:', err);
              setLoadError('Failed to process map data: ' + err.message);
              setLoading(false);
            }
          };

          if (topoCache.current[cfg.url]) {
            doLoad(topoCache.current[cfg.url]);
          } else {
            d3.json(cfg.url)
              .then(topo => {
                topoCache.current[cfg.url] = topo;
                doLoad(topo);
              })
              .catch(err => {
                setLoadError('Could not load map. Check your internet connection.');
                setLoading(false);
              });
          }
        }
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [selectedMap]);

      // Reset selectedColor if it's no longer in the active palette
      useEffect(() => {
        if (selectedColor && !activeColors.find(c => c.id === selectedColor)) {
          setSelectedColor(null);
        }
      }, [numColors, selectedColor, activeColors]);

      // ── Handlers ──────────────────────────────────────────────────
      const handleRegionClick = useCallback((regionId) => {
        if (gameStatus !== 'playing') return;
        if (!selectedColor) {
          setMessage({ text:'Pick a color first!', type:'info' });
          return;
        }
        if (regionColors[regionId]) {
          setMessage({ text:'That region is already colored.', type:'info' });
          return;
        }
        const nbs     = adjacency[regionId] || new Set();
        const blocked = [...nbs].some(nId => regionColors[nId] === selectedColor);
        if (blocked) {
          const cn = ALL_COLORS.find(c => c.id === selectedColor)?.name || '';
          setMessage({ text:`Can't use ${cn} here — a neighboring region already has that color!`, type:'error' });
          setFlashRegion(regionId);
          playSound('invalid');
          setTimeout(() => setFlashRegion(null), 450);
          return;
        }
        const newColors = { ...regionColors, [regionId]: selectedColor };
        setRegionColors(newColors);
        setMessage(null);
        playSound('place');
        if (Object.keys(newColors).length === mapFeatures.length) {
          setGameStatus('won');
          playSound('win');
          const cols = ALL_COLORS.map(c => c.hex);
          setConfetti(Array.from({length:50}, (_,i) => ({
            id:i, left:Math.random()*100,
            color:cols[i % cols.length],
            size:7+Math.random()*9,
            delay:Math.random()*1.2,
            dur:2.5+Math.random()*2,
          })));
          return;
        }
        setCurrentPlayer(p => p===1 ? 2 : 1);
        setSelectedColor(null);
      }, [gameStatus, selectedColor, regionColors, adjacency, mapFeatures.length]);

      // ── Derived values ─────────────────────────────────────────────
      const coloredCount = Object.keys(regionColors).length;
      const totalCount   = mapFeatures.length;
      const progress     = totalCount > 0 ? (coloredCount / totalCount) * 100 : 0;

      const isStuck = useMemo(() => {
        if (gameStatus !== 'playing' || totalCount === 0) return false;
        const uncolored = mapFeatures.filter(f => !regionColors[f.id]);
        if (uncolored.length === 0) return false;
        return uncolored.every(f => {
          const nbs  = adjacency[f.id] || new Set();
          const used = new Set([...nbs].map(n => regionColors[n]).filter(Boolean));
          return activeColors.every(c => used.has(c.id));
        });
      }, [mapFeatures, regionColors, adjacency, gameStatus, totalCount, activeColors]);

      const cfg    = MAP_CONFIGS[selectedMap];
      const p1col  = '#FF6B6B';
      const p2col  = '#4ECDC4';
      const pcol   = currentPlayer === 1 ? p1col : p2col;
      const isCustom = cfg.type === 'custom';

      // SVG background / stroke colors
      const svgBg      = isCustom ? cfg.bgFill      : '#1a1a2e';
      const regDefault = isCustom ? cfg.regionDefault : '#cccccc';
      const stroke     = isCustom ? cfg.strokeColor   : '#111827';

      return (
        <div className="flex flex-col" style={{height:'100vh', background:'linear-gradient(135deg,#1a1a2e 0%,#16213e 55%,#0f3460 100%)', fontFamily:"'Segoe UI',sans-serif"}}>

          {/* ── Header ───────────────────────────────────────────── */}
          <header className="flex items-center justify-between px-4 py-2 flex-shrink-0"
            style={{background:'rgba(0,0,0,0.4)', borderBottom:'1px solid rgba(255,255,255,0.09)'}}>
            <h1 className="text-xl font-bold text-white tracking-wide select-none">🗺️ Cartographer</h1>
            <div className="flex items-center gap-2 flex-wrap justify-end">
              {/* Color count selector */}
              <div className="flex items-center gap-1">
                <span className="text-xs text-white/40 mr-1">Colors:</span>
                {[3,4,5,6].map(n => (
                  <button key={n} onClick={() => setNumColors(n)}
                    className="w-7 h-7 rounded-lg text-xs font-bold transition"
                    style={{
                      background: numColors===n ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.1)',
                      color:      numColors===n ? '#1a1a2e' : 'rgba(255,255,255,0.6)',
                      border:     numColors===n ? '2px solid #fff' : '2px solid rgba(255,255,255,0.15)',
                    }}>
                    {n}
                  </button>
                ))}
              </div>
              {/* Map selector */}
              <select value={selectedMap} onChange={e => setSelectedMap(e.target.value)}
                className="text-white text-sm px-2 py-1.5 rounded-lg border cursor-pointer"
                style={{background:'rgba(255,255,255,0.1)', borderColor:'rgba(255,255,255,0.2)'}}>
                <optgroup label="Real Maps" style={{background:'#16213e'}}>
                  <option value="us"           style={{background:'#16213e'}}>United States</option>
                  <option value="africa"       style={{background:'#16213e'}}>Africa</option>
                  <option value="europe"       style={{background:'#16213e'}}>Europe</option>
                  <option value="south_america"style={{background:'#16213e'}}>South America</option>
                  <option value="asia"         style={{background:'#16213e'}}>Asia</option>
                </optgroup>
                <optgroup label="Fantasy Maps" style={{background:'#16213e'}}>
                  <option value="enchancia"    style={{background:'#16213e'}}>Enchancia (Sofia)</option>
                  <option value="equestria"    style={{background:'#16213e'}}>Equestria (MLP)</option>
                </optgroup>
              </select>
              <a href="../index.html" className="text-sm px-3 py-1.5 rounded-lg border transition"
                style={{color:'rgba(255,255,255,0.6)', borderColor:'rgba(255,255,255,0.18)', background:'rgba(255,255,255,0.05)'}}>
                ← Back
              </a>
            </div>
          </header>

          {/* ── Body ─────────────────────────────────────────────── */}
          <div className="flex flex-1 overflow-hidden">

            {/* ── Map area ─────────────────────────────────────── */}
            <div className="flex-1 relative flex items-center justify-center overflow-hidden">
              {loadError ? (
                <div className="text-red-400 text-base px-8 text-center">{loadError}</div>
              ) : loading ? (
                <div className="text-white/50 text-lg">Loading {cfg.label}…</div>
              ) : (
                <svg
                  viewBox="0 0 600 420"
                  preserveAspectRatio="xMidYMid meet"
                  style={{width:'100%', height:'100%', display:'block'}}
                >
                  {/* Background */}
                  <rect width="600" height="420" fill={svgBg} />

                  {/* Map title */}
                  <text x="300" y="20" textAnchor="middle"
                    fill="rgba(255,255,255,0.5)" fontSize="13" fontWeight="700"
                    style={{userSelect:'none'}}>
                    {cfg.label}{cfg.subtitle ? ` — ${cfg.subtitle}` : ''}
                  </text>

                  {/* Regions */}
                  {mapFeatures.map(f => {
                    const col     = regionColors[f.id];
                    const hexFill = col ? ALL_COLORS.find(c => c.id===col)?.hex : regDefault;
                    const flash   = flashRegion === f.id;
                    return (
                      <g key={f.id} onClick={() => handleRegionClick(f.id)}>
                        <path
                          d={f.pathD}
                          fill={hexFill}
                          stroke={stroke}
                          strokeWidth="0.8"
                          strokeLinejoin="round"
                          className={'region-path' +
                            (gameStatus==='playing' && !col ? ' clickable' : '') +
                            (flash ? ' invalid-flash' : '')}
                        />
                        {f.centroid && f.name && (
                          <text
                            x={f.centroid[0]} y={f.centroid[1]}
                            textAnchor="middle" dominantBaseline="middle"
                            fontSize={cfg.fontSize || 7}
                            fontWeight="700"
                            fill={col ? 'rgba(0,0,0,0.72)' : (isCustom ? 'rgba(0,0,0,0.5)' : '#555')}
                            style={{pointerEvents:'none', userSelect:'none'}}>
                            {f.name}
                          </text>
                        )}
                      </g>
                    );
                  })}
                </svg>
              )}

              {/* Confetti overlay */}
              {confetti.map(p => (
                <div key={p.id} style={{
                  position:'absolute', left:p.left+'%', top:-16,
                  width:p.size, height:p.size, background:p.color, pointerEvents:'none',
                  borderRadius: p.id%3===0 ? '50%' : '2px',
                  animation:`confettiFall ${p.dur}s ease-out ${p.delay}s forwards`,
                }}/>
              ))}
            </div>

            {/* ── Side panel ───────────────────────────────────── */}
            <div className="flex-shrink-0 flex flex-col gap-3 p-4 overflow-y-auto"
              style={{width:220, background:'rgba(0,0,0,0.35)', borderLeft:'1px solid rgba(255,255,255,0.08)'}}>

              {gameStatus === 'playing' && !loading && !loadError && (<>
                {/* Player turn */}
                <div className="rounded-xl p-3 text-center"
                  style={{background:`${pcol}18`, border:`2px solid ${pcol}`}}>
                  <div className="text-xs text-white/40 uppercase tracking-widest mb-0.5">Your Turn</div>
                  <div className="text-xl font-bold" style={{color:pcol}}>Player {currentPlayer}</div>
                </div>

                {/* Color picker */}
                <div>
                  <div className="text-xs text-white/40 uppercase tracking-widest mb-2">Pick a Color</div>
                  <div className="grid grid-cols-3 gap-1.5">
                    {activeColors.map(c => (
                      <button key={c.id} title={c.name}
                        onClick={() => setSelectedColor(id => id===c.id ? null : c.id)}
                        className="rounded-lg h-9 transition-all"
                        style={{
                          background:c.hex,
                          border: selectedColor===c.id ? '3px solid #fff' : '3px solid rgba(255,255,255,0.12)',
                          transform: selectedColor===c.id ? 'scale(1.12)' : 'scale(1)',
                          boxShadow: selectedColor===c.id ? `0 0 10px ${c.hex}99` : 'none',
                        }}/>
                    ))}
                  </div>
                  <p className="text-xs text-center mt-2" style={{color:'rgba(255,255,255,0.32)'}}>
                    {selectedColor ? 'Now click a region →' : 'Select a color above'}
                  </p>
                </div>

                {/* Progress */}
                <div>
                  <div className="flex justify-between text-xs mb-1" style={{color:'rgba(255,255,255,0.38)'}}>
                    <span>{coloredCount} colored</span>
                    <span>{totalCount - coloredCount} left</span>
                  </div>
                  <div className="w-full h-2.5 rounded-full" style={{background:'rgba(255,255,255,0.1)'}}>
                    <div className="h-2.5 rounded-full transition-all duration-300"
                      style={{width:`${progress}%`, background:'linear-gradient(90deg,#2ECC71,#27AE60)'}}/>
                  </div>
                </div>

                {/* Message */}
                {message && (
                  <div key={message.text} className="rounded-lg px-3 py-2 text-xs leading-snug"
                    style={{
                      color: message.type==='error' ? '#FC8181' : '#90CDF4',
                      background: message.type==='error' ? 'rgba(231,76,60,0.15)' : 'rgba(52,152,219,0.15)',
                      border: `1px solid ${message.type==='error' ? 'rgba(231,76,60,0.35)' : 'rgba(52,152,219,0.35)'}`,
                    }}>
                    {message.text}
                  </div>
                )}

                {/* Stuck warning */}
                {isStuck && (
                  <div className="rounded-lg px-3 py-2 text-xs text-center"
                    style={{color:'#FFA500', background:'rgba(255,165,0,0.12)', border:'1px solid rgba(255,165,0,0.35)'}}>
                    No valid moves left!
                  </div>
                )}

                {/* Instructions */}
                <div className="text-xs leading-relaxed mt-auto" style={{color:'rgba(255,255,255,0.28)'}}>
                  <strong style={{color:'rgba(255,255,255,0.45)'}}>How to play:</strong>
                  {' '}Players take turns picking a color, then clicking a region. No two touching regions can share a color — corners are OK. Color the whole map together to win!
                </div>

                {/* Give up */}
                <button onClick={() => setGameStatus('lost')}
                  className="rounded-lg py-2 text-sm font-medium transition"
                  style={{color:'#FC8181', border:'1px solid rgba(252,129,129,0.3)', background:'transparent'}}
                  onMouseOver={e => e.currentTarget.style.background='rgba(252,129,129,0.1)'}
                  onMouseOut={e => e.currentTarget.style.background='transparent'}>
                  Give Up
                </button>
              </>)}

              {gameStatus === 'won' && (
                <div className="flex flex-col items-center justify-center gap-4 flex-1 text-center py-8">
                  <div style={{fontSize:52}}>🎉</div>
                  <div className="text-2xl font-bold" style={{color:'#F1C40F'}}>You Win!</div>
                  <div className="text-sm leading-relaxed" style={{color:'rgba(255,255,255,0.65)'}}>
                    The whole map is colored! Both players win!
                  </div>
                  <button onClick={resetGame}
                    className="px-6 py-2 rounded-xl text-white font-bold text-sm"
                    style={{background:'linear-gradient(135deg,#2ECC71,#27AE60)'}}>
                    Play Again
                  </button>
                </div>
              )}

              {gameStatus === 'lost' && (
                <div className="flex flex-col items-center justify-center gap-4 flex-1 text-center py-8">
                  <div style={{fontSize:52}}>😔</div>
                  <div className="text-2xl font-bold" style={{color:'#FC8181'}}>Game Over</div>
                  <div className="text-sm leading-relaxed" style={{color:'rgba(255,255,255,0.65)'}}>
                    Don't give up! Try again and color the whole map!
                  </div>
                  <button onClick={resetGame}
                    className="px-6 py-2 rounded-xl text-white font-bold text-sm"
                    style={{background:'linear-gradient(135deg,#3498DB,#2980B9)'}}>
                    Try Again
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <ErrorBoundary><Cartographer /></ErrorBoundary>
    );
  </script>
  <a href="../../index.html" style="position:fixed;top:10px;left:10px;z-index:99999;background:#fff;color:#2b2440;font:800 15px system-ui,sans-serif;text-decoration:none;padding:8px 14px;border-radius:999px;box-shadow:0 4px 0 #d9d2c4">🏠 Arcade</a>
</body>
</html>
