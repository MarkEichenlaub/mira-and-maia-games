<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Möbius Madness</title>
<link rel="stylesheet" href="../../assets/common.css">
</head>
<body>
<script src="../../assets/common.js"></script>
<script>
/* MÖBIUS MADNESS — a Möbius strip has ONE side and ONE edge.
   We render a 3D parametric ribbon on Canvas with slow auto-rotation.
   Big buttons animate: draw the center line (proves one side),
   color the edge (proves one edge), and cut down the middle
   (reveals ONE bigger loop). Vanilla JS, offline-only. */

MM.game({
  title: 'Möbius Madness', emoji: '♾️',
  ba: 'https://beastacademy.com/playground/mobius-madness',
  rules: `
    <p><b>A Möbius strip is a magic loop!</b> 🪄</p>
    <p>Take a long strip of paper. If you tape the ends together straight, you get a normal ring. A normal ring has <b>2 sides</b> (an inside and an outside) and <b>2 edges</b> (a top rim and a bottom rim).</p>
    <p>But if you give the paper <b>one half-twist</b> before you tape it, something amazing happens:</p>
    <ul>
      <li>✏️ <b>One side!</b> If you draw a line down the middle without lifting your marker, it goes all the way around <b>both</b> faces and meets itself. There's really only <b>one side</b>.</li>
      <li>🖍️ <b>One edge!</b> Color along the rim and you'll color the whole edge in one trip — it's all <b>one edge</b>.</li>
      <li>✂️ <b>One loop!</b> Cut it down the middle and it does NOT fall into two rings. You get <b>one giant loop</b>!</li>
    </ul>
    <p>Press the big buttons and watch the magic happen! 🎉</p>`,
  onStart,
});

function onStart(mode, mount) {
  const W = Math.min(560, window.innerWidth - 28);
  const H = Math.round(W * 0.78);
  const dpr = window.devicePixelRatio || 1;

  const panel = MM.el('div', { class: 'mm-panel mm-center mm-bounce-in' });
  const cv = MM.el('canvas', { style: { width: W + 'px', height: H + 'px', maxWidth: '100%', touchAction: 'manipulation', display: 'block', margin: '0 auto', borderRadius: '18px' } });
  cv.width = W * dpr; cv.height = H * dpr;
  const g = cv.getContext('2d'); g.scale(dpr, dpr);

  const caption = MM.el('div', { class: 'mm-hint', style: { fontSize: '17px', fontWeight: '800', minHeight: '1.4em', color: '#8338ec' } }, 'This is a Möbius strip. Watch it spin! 🌀');

  const row1 = MM.el('div', { class: 'mm-row', style: { marginTop: '12px' } });
  const row2 = MM.el('div', { class: 'mm-row', style: { marginTop: '10px' } });

  const btnDraw = bigBtn('✏️ Draw the line', 'blue');
  const btnEdge = bigBtn('🖍️ Color the edge', 'orange');
  const btnCut  = bigBtn('✂️ Cut down the middle', 'pink');
  const btnReset = bigBtn('🔄 Reset', 'ghost');
  row1.append(btnDraw, btnEdge);
  row2.append(btnCut, btnReset);

  panel.append(cv, caption, row1, row2);
  mount.appendChild(panel);
  MM.status('<span class="chip" style="background:#8338ec">Möbius Magic ♾️</span>');

  function bigBtn(label, cls) {
    const b = MM.el('button', { class: 'mm-btn ' + cls, style: { minHeight: '52px', fontSize: '18px' } }, label);
    return b;
  }

  /* ---- 3D Möbius geometry ----
     Parametric surface. u in [0,2π) around the loop, v in [-1,1] across the width.
     A half-twist: the cross-section rotates by u/2 as we go around.  */
  const R = 1.15;          // radius of the center loop
  const width = 0.42;      // half-width of the ribbon
  let angle = 0.7;         // auto-rotation about vertical axis
  let tilt = -0.62;        // fixed viewing tilt

  // point on the strip in 3D (before view rotation)
  function surf(u, v) {
    const c = Math.cos(u), s = Math.sin(u);
    const h = u / 2;                       // half-twist
    const rr = R + v * width * Math.cos(h);
    return [rr * c, rr * s, v * width * Math.sin(h)];
  }
  // rotate about world-Y (spin) then about world-X (tilt), then project
  function project(p) {
    let [x, y, z] = p;
    // spin about Y
    let x1 = x * Math.cos(angle) + z * Math.sin(angle);
    let z1 = -x * Math.sin(angle) + z * Math.cos(angle);
    // tilt about X
    let y2 = y * Math.cos(tilt) - z1 * Math.sin(tilt);
    let z2 = y * Math.sin(tilt) + z1 * Math.cos(tilt);
    const scale = Math.min(W, H) * 0.30;
    const persp = 3.4 / (3.4 - z2 * 0.55);
    return { x: W / 2 + x1 * scale * persp, y: H / 2 + y2 * scale * persp, z: z2 };
  }

  const USTEPS = 120;      // segments around the loop
  // animation state
  let anim = null;         // { type, t }  active animation
  let lineProgress = 0;    // 0..2 for center line (needs 2 laps to close on one side)
  let edgeProgress = 0;    // 0..2 for edge coloring
  let cut = 0;             // 0..1 cutting progress, then stays 1 with separated look

  function drawRibbon() {
    // Build quad strips; sort by average depth (painter's algorithm).
    const quads = [];
    for (let i = 0; i < USTEPS; i++) {
      const u0 = (i / USTEPS) * 2 * Math.PI;
      const u1 = ((i + 1) / USTEPS) * 2 * Math.PI;
      const uu = (i + 0.5) / USTEPS;   // for shading + cut gap
      // if cutting, split into two half-ribbons with a growing gap in the middle
      const gap = cut > 0 ? 0.06 * Math.min(1, cut) : 0;
      if (cut > 0) {
        // two thin ribbons: outer half (v: gap..1) and inner half (v: -1..-gap)
        addQuad(quads, u0, u1, gap, 1, uu, 'out');
        addQuad(quads, u0, u1, -1, -gap, uu, 'in');
      } else {
        addQuad(quads, u0, u1, -1, 1, uu, 'full');
      }
    }
    quads.sort((a, b) => a.z - b.z);
    for (const q of quads) paintQuad(q);
  }

  function addQuad(quads, u0, u1, va, vb, uu, part) {
    const a = project(surf(u0, va)), b = project(surf(u0, vb));
    const c = project(surf(u1, vb)), d = project(surf(u1, va));
    quads.push({ pts: [a, b, c, d], z: (a.z + b.z + c.z + d.z) / 4, uu, va, vb, part });
  }

  function paintQuad(q) {
    const [a, b, c, d] = q.pts;
    // simple shading from depth
    const shade = 0.55 + 0.45 * (q.z + 1) / 2;
    // base ribbon color; when cut, tint the two halves differently for clarity
    let base;
    if (cut > 0) base = q.part === 'out' ? [58, 134, 255] : [46, 196, 182];
    else base = [255, 210, 63];  // sunny yellow strip
    const col = base.map(c2 => Math.round(Math.min(255, c2 * shade)));
    g.beginPath();
    g.moveTo(a.x, a.y); g.lineTo(b.x, b.y); g.lineTo(c.x, c.y); g.lineTo(d.x, d.y); g.closePath();
    g.fillStyle = `rgb(${col[0]},${col[1]},${col[2]})`;
    g.fill();
    g.strokeStyle = 'rgba(120,90,20,0.14)';
    g.lineWidth = 0.6; g.stroke();
  }

  // draw a poly-line along the surface at fixed v, for parameter u in [0, span]
  function drawSurfaceLine(v, uStart, span, color, wLine, dashCap) {
    if (span <= 0) return;
    g.beginPath();
    const N = Math.max(2, Math.round((span / (2 * Math.PI)) * USTEPS * 1.2));
    for (let i = 0; i <= N; i++) {
      const u = uStart + (i / N) * span;
      const p = project(surf(u, v));
      if (i === 0) g.moveTo(p.x, p.y); else g.lineTo(p.x, p.y);
    }
    g.strokeStyle = color; g.lineWidth = wLine; g.lineCap = 'round'; g.lineJoin = 'round';
    g.stroke();
    if (dashCap != null) {
      const p = project(surf(uStart + span, v));
      g.beginPath(); g.arc(p.x, p.y, wLine * 0.9, 0, 7); g.fillStyle = dashCap; g.fill();
    }
  }

  function frame() {
    g.clearRect(0, 0, W, H);
    if (!(anim && anim.freezeSpin)) angle += 0.008;   // slow auto-rotate
    drawRibbon();

    // center line (one side proof) — travels 2 laps (0..4π) to return to start
    if (lineProgress > 0 && cut === 0) {
      const span = Math.min(lineProgress, 2) * 2 * Math.PI;
      drawSurfaceLine(0, 0, span, '#ff5a5f', 7, lineProgress < 2 ? '#ff5a5f' : null);
    }
    // edge coloring (one edge proof) — the single boundary is the strip at v=±1;
    // because of the twist, following v=1 for 2 laps traces the whole rim.
    if (edgeProgress > 0 && cut === 0) {
      const span = Math.min(edgeProgress, 2) * 2 * Math.PI;
      drawSurfaceLine(1, 0, span, '#8338ec', 6, edgeProgress < 2 ? '#8338ec' : null);
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  /* ---- interactions ---- */
  let busy = false;
  function lock(v) { busy = v; [btnDraw, btnEdge, btnCut].forEach(b => b.disabled = v); }

  btnDraw.addEventListener('click', async () => {
    if (busy) return; reset(false); lock(true);
    MM.sound.play('swoosh');
    caption.textContent = 'Drawing down the middle… ✏️';
    // animate 2 laps
    const steps = 90;
    for (let i = 1; i <= steps; i++) {
      lineProgress = (i / steps) * 2;
      if (i % 10 === 0) MM.sound.play('click');
      await MM.sleep(24);
    }
    lineProgress = 2;
    caption.innerHTML = '✨ <b>One side!</b> The line met itself — it covered the whole strip without ever lifting up!';
    MM.sound.play('ding');
    MM.confetti({ count: 90 });
    lock(false);
  });

  btnEdge.addEventListener('click', async () => {
    if (busy) return; reset(false); lock(true);
    MM.sound.play('swoosh');
    caption.textContent = 'Coloring along the edge… 🖍️';
    const steps = 90;
    for (let i = 1; i <= steps; i++) {
      edgeProgress = (i / steps) * 2;
      if (i % 10 === 0) MM.sound.play('pop');
      await MM.sleep(24);
    }
    edgeProgress = 2;
    caption.innerHTML = '✨ <b>One edge!</b> The color went all the way around and came back — it\'s all one single edge!';
    MM.sound.play('ding');
    MM.confetti({ count: 90 });
    lock(false);
  });

  btnCut.addEventListener('click', async () => {
    if (busy) return; reset(false); lock(true);
    // first trace the cut line, then split
    caption.textContent = 'Cutting down the middle… ✂️';
    MM.sound.play('swoosh');
    const trace = 60;
    for (let i = 1; i <= trace; i++) {
      lineProgress = (i / trace) * 2;
      await MM.sleep(18);
    }
    MM.sound.play('swoosh');
    // now open the cut
    const open = 50;
    for (let i = 1; i <= open; i++) {
      cut = i / open;
      lineProgress = 0;   // hide the marker line once the paint splits
      if (i % 8 === 0) MM.sound.play('click');
      await MM.sleep(26);
    }
    cut = 1;
    caption.innerHTML = '🤯 <b>Surprise!</b> It didn\'t fall into two rings — you get <b>ONE giant loop</b> (twice as long)!';
    MM.sound.play('win');
    MM.confetti({ count: 170 });
    lock(false);
  });

  btnReset.addEventListener('click', () => { if (busy) return; reset(true); MM.sound.play('click'); });

  function reset(withMsg) {
    lineProgress = 0; edgeProgress = 0; cut = 0;
    if (withMsg) caption.textContent = 'This is a Möbius strip. Watch it spin! 🌀';
  }
}
</script>
</body>
</html>
